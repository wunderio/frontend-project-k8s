
# Values in this file override the default values of our helm chart.
#
# See https://github.com/wunderio/charts/blob/master/frontend/values.yaml
# for all possible options.

nginx:
  redirects:
    - description: 'Redirect main path to default service (exact match)'
      from: ""
      to: /hello
    - description: 'Redirect main path to default service (exact match)'
      from: /
      to: /hello

services:
  hello:
    exposedRoute: '/hello'
    port: 4000
    env:
      FOO: 'BAR'
    # Overridden liveness probe.
    livenessProbe:
      tcpSocket:
        port: 4000
      initialDelaySeconds: 30
    # Overridden lifecycle hook.
    lifecycle:
      postStart:
        exec:
          command: ['/bin/sh', '-c', 'echo "Hello container is starting" > /usr/share/message']
      preStop:
        exec:
          command: ['/bin/sh', '-c', 'echo "Hello container is shutting down" > /usr/share/message; /bin/sleep 5']
    postinstall:
      command: |
        echo Postinstall command executed
    postupgrade:
      command: |
        echo Postupgrade command executed

  world:
    exposedRoute: '/world'
    port: 5000
    replicas: 2
    mounts:
      - files
    cron:
      world-cli:
        command: echo $(date) > /app/files/lastupdate.txt
        schedule: "~ * * * *"
    backup:
      command: |
        echo "made in world container" >> /backups/current/world_file

#domainPrefixes: ['fi', 'lv' ]

mounts:
  files:
    enabled: true
    storage: 1G
    mountPath: /app/files
    storageClassName: silta-shared
    csiDriverName: csi-rclone

shell:
  enabled: true

silta-release:
  proxy:
    enabled: true
  downscaler:
    # How long should releases be kept by default.
    defaultMinAge: 1d
    # How long should releases with matching names be kept. The last matching rule takes effect.
    releaseMinAge:
      "^production": 10y
      "^(master|main|stage|staging)": 8w
      "^(dev|develop|development)": 4w
      "^dependabot": 1h
      "^feature": 1w

varnish:
  enabled: true

redis:
  enabled: false
  auth:
    password: "foo"

mongodb:
  enabled: true
